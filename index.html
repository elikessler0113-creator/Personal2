<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eli Kessler | Portfolio</title>
    <link rel="stylesheet" href="css/style.css">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
</head>
<body>

<header class="main-header">
    <div class="header-container">
        <a href="index.html" class="logo">
            <span class="logo-dot"></span> ELI<span>KESSLER</span>
        </a>

        <nav class="nav-links">
            <a href="index.html" data-en="Home" data-es="Inicio">Home</a>
            <a href="resume.html" data-en="Resume" data-es="Currículum">Resume</a>
            <a href="experience.html" data-en="Experience" data-es="Experiencia">Experience</a>
        </nav>

        <div class="page-settings">
            <button id="lang-toggle" class="settings-btn" title="Translate">
                <span id="lang-text">ES</span>
            </button>
            <button id="theme-toggle" class="settings-btn" title="Toggle Theme">
                <span id="theme-icon">🌙</span>
            </button>
        </div>
    </div>
</header>

<main>
    <section class="hero">
        <div class="hero-content">
            <h1 data-en="Crafting digital experiences." data-es="Creando experiencias digitales.">
                Crafting digital experiences.
            </h1>

               data-es="Estudiante de contabilidad en UMD con pasión por el código limpio y la comunicación bilingüe.">
                Accounting student at UMD with a passion for clean code and bilingual communication.
            </p>
            <div class="hero-btns">
                <a href="experience.html" class="btn btn-primary" data-en="View Projects" data-es="Ver Proyectos">View Projects</a>
                <a href="resume.html" class="btn btn-secondary" data-en="Download Resume" data-es="Descargar CV">Download Resume</a>
            </div>
        </div>
    </section>
</main>

<script src="js/script.js"></script>
</body>
</html>
