<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eli Kessler | Portfolio</title>
    <link rel="stylesheet" href="css/style.css">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
</head>
<body>

<header class="main-header">
    <div class="header-container">
        <a href="/" class="logo">
            <span class="logo-dot"></span> ELI<span>KESSLER</span>
        </a>

        <nav class="nav-links">
            <a href="/" data-en="Home" data-es="Inicio">Home</a>
            <a href="resume" data-en="Resume" data-es="Currículum">Resume</a>
            <a href="experience" data-en="Experience" data-es="Experiencia">Experience</a>
        </nav>

        <div class="page-settings">
            <button id="lang-toggle" class="settings-btn" title="Translate">
                <span id="lang-text">ES</span>
            </button>
            <button id="theme-toggle" class="settings-btn" title="Toggle Theme">
                <span id="theme-icon">🌙</span>
            </button>
        </div>
    </div>
</header>

<main>
    <section class="hero">
        <div class="hero-content">
            <h1 data-en="Welcome to my Personal Website!" data-es="¡Bienvenido a mi Sitio Personal!">
                Welcome to my Personal Website!
            </h1>
            <p data-en="Business student at the University of Minnesota Duluth pursuing a degree in Business Management with a minor is Spanish Studies." 
               data-es="Estudiante de negocios en la Universidad de Minnesota Duluth con una especialización en la gestion empresarial y estudios de Español.">
                Business student at the University of Minnesota Duluth pursuing a degree in Business Management with a minor is Spanish Studies.
            </p>
            <div class="hero-btns">
                <a href="experience" class="btn btn-primary" data-en="My Projects and Experience" data-es="Mis Proyectos y Experiencia">My Projects and Experience</a>
                <a href="resume" class="btn btn-secondary" data-en="My Resume" data-es="Mi Currículum">My Resume</a>
            </div>
        </div>
    </section>
</main>

<script src="js/script.js"></script>
</body>
</html>
